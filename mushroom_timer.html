<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>蘑菇重生時間計算器（通知版）</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
      padding: 24px;
      max-width: 980px;
      margin: auto;
    }
    h2 { margin-top: 28px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
    label { display: block; font-size: 14px; margin-bottom: 6px; }
    input {
      padding: 10px; font-size: 16px; border-radius: 10px;
      border: 1px solid #ccc; width: 110px;
    }
    input.people { width: 80px; }
    input.remark { width: 260px; }
    button {
      padding: 10px 14px; font-size: 16px; border-radius: 10px;
      border: none; cursor: pointer;
    }
    .primary { background: #111; color: #fff; }
    .secondary { background: #eee; }
    .danger { background: #ffe9e9; }
    .tiny { padding: 6px 10px; font-size: 14px; border-radius: 10px; }
    .muted { color: #666; font-size: 14px; }
    .big { font-size: 20px; font-weight: 700; }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; font-size: 14px; vertical-align: top; }
    th { background: #fafafa; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
    .pill {
      display:inline-block; padding: 4px 10px; border-radius: 999px;
      border: 1px solid #ddd; font-size: 12px;
    }
    .ok { background: #f4fff4; }
    .warn { background: #fff7e6; }
    .bad { background: #ffecec; }
  </style>
</head>
<body>

<h1>蘑菇重生時間計算器（通知版）</h1>

<div class="card">
  <div class="muted">
    目前系統時間：<span id="nowText" class="mono"></span>
  </div>

  <div class="actions">
    <button class="secondary" id="notifyBtn">啟用通知</button>
    <span id="notifyStatus" class="pill warn">通知：未啟用</span>
    <span class="muted">（GitHub Pages 是 HTTPS；手機端瀏覽器不要完全關掉）</span>
  </div>

  <hr style="border:none;border-top:1px solid #eee;margin:14px 0;" />

  <div class="row">
    <div>
      <label>剩餘（時）</label>
      <input id="h" type="number" min="0" value="0">
    </div>
    <div>
      <label>剩餘（分）</label>
      <input id="m" type="number" min="0" value="0">
    </div>
    <div>
      <label>剩餘（秒）</label>
      <input id="s" type="number" min="0" value="0">
    </div>
    <div>
      <label>人數</label>
      <input id="people" class="people" type="number" min="1" value="5">
    </div>
    <div>
      <label>備註</label>
      <input id="remark" class="remark" type="text" placeholder="例如：東邊第三朵">
    </div>
    <div>
      <button class="primary" id="calcBtn">計算</button>
      <button class="secondary" id="resetBtn">重置</button>
    </div>
  </div>

  <div id="resultBox" style="display:none;margin-top:12px;">
    <div class="muted">蘑菇重生時間（已包含固定 +4 分鐘）</div>
    <div class="big mono" id="respawnText"></div>
  </div>

  <div class="actions">
    <button class="danger" id="clearHistoryBtn">清空歷程</button>
    <span class="muted">（重整會自動刪除過期；同備註合併；依重生時間越近越上；最多 20 筆；保存在 localStorage）</span>
  </div>
</div>

<h2>⏱ 計算歷程</h2>

<table>
  <thead>
    <tr>
      <th>計算時間</th>
      <th>重生時間</th>
      <th>人數</th>
      <th>備註</th>
      <th>狀態</th>
      <th style="width:88px;">操作</th>
    </tr>
  </thead>
  <tbody id="historyBody"></tbody>
</table>

<script>
  const FIXED_BONUS_MINUTES = 4;
  const MAX_HISTORY = 20;
  const STORAGE_KEY = "mushroom_respawn_history_notify_v2";

  const nowText = document.getElementById("nowText");
  const hEl = document.getElementById("h");
  const mEl = document.getElementById("m");
  const sEl = document.getElementById("s");
  const peopleEl = document.getElementById("people");
  const remarkEl = document.getElementById("remark");
  const respawnText = document.getElementById("respawnText");
  const resultBox = document.getElementById("resultBox");
  const historyBody = document.getElementById("historyBody");
  const clearHistoryBtn = document.getElementById("clearHistoryBtn");

  const notifyBtn = document.getElementById("notifyBtn");
  const notifyStatus = document.getElementById("notifyStatus");

  let history = [];
  let tickTimer = null;

  const pad2 = n => String(n).padStart(2, "0");
  const format = d =>
    `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())} `
    + `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;

  function updateNow() {
    nowText.textContent = format(new Date());
  }

  function normalize() {
    let h = Math.max(0, Math.floor(Number(hEl.value) || 0));
    let m = Math.max(0, Math.floor(Number(mEl.value) || 0));
    let s = Math.max(0, Math.floor(Number(sEl.value) || 0));
    let people = Math.max(1, Math.floor(Number(peopleEl.value) || 5));

    m += Math.floor(s / 60);
    s %= 60;
    h += Math.floor(m / 60);
    m %= 60;

    hEl.value = h;
    mEl.value = m;
    sEl.value = s;
    peopleEl.value = people;

    return { h, m, s, people };
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function safeRemarkKey(raw) {
    return (raw || "").trim();
  }

  function saveHistory() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  }

  function loadHistory() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      if (!Array.isArray(arr)) return [];
      return arr;
    } catch {
      return [];
    }
  }

  function sortAndTrim() {
    // 依重生時間越近（越早到）排最上面
    history.sort((a, b) => {
      if (a.respawnTs !== b.respawnTs) return a.respawnTs - b.respawnTs;
      return b.calcTs - a.calcTs;
    });
    history = history.slice(0, MAX_HISTORY);
  }

  // ===== 新增：重整後刪除過期 =====
  function purgeExpiredOnLoad() {
    const now = Date.now();
    const before = history.length;
    history = history.filter(item => Number(item.respawnTs) > now);
    return history.length !== before;
  }

  // ===== 通知相關 =====
  function canUseNotification() {
    return ("Notification" in window);
  }

  function updateNotifyUI() {
    if (!canUseNotification()) {
      notifyStatus.textContent = "通知：不支援";
      notifyStatus.className = "pill bad";
      notifyBtn.disabled = true;
      return;
    }

    const p = Notification.permission; // 'default' | 'granted' | 'denied'
    if (p === "granted") {
      notifyStatus.textContent = "通知：已啟用";
      notifyStatus.className = "pill ok";
      notifyBtn.textContent = "通知已啟用";
      notifyBtn.disabled = true;
    } else if (p === "denied") {
      notifyStatus.textContent = "通知：已封鎖（請到瀏覽器設定開啟）";
      notifyStatus.className = "pill bad";
      notifyBtn.textContent = "已封鎖";
      notifyBtn.disabled = true;
    } else {
      notifyStatus.textContent = "通知：未啟用";
      notifyStatus.className = "pill warn";
      notifyBtn.textContent = "啟用通知";
      notifyBtn.disabled = false;
    }
  }

  async function requestNotifyPermission() {
    if (!canUseNotification()) return false;
    if (Notification.permission === "granted") return true;
    if (Notification.permission === "denied") return false;

    const res = await Notification.requestPermission();
    updateNotifyUI();
    return res === "granted";
  }

  function notifyRespawn(item) {
    if (!canUseNotification()) return;
    if (Notification.permission !== "granted") return;

    new Notification("🍄 蘑菇已重生", {
      body: `${item.remark || "（無備註）"}｜人數 ${item.people}`,
      tag: `mushroom_${item.id}`,
      vibrate: [200, 100, 200]
    });
  }

  // ===== 狀態判斷（此版因為重整會刪過期，所以基本上不會看到過期）=====
  function statusText(item) {
    if (item.notified) return "已通知";
    if (Date.now() >= item.respawnTs) return "已重生（待通知）";
    return "倒數中";
  }

  function renderHistory() {
    historyBody.innerHTML = "";

    if (history.length === 0) {
      historyBody.innerHTML = `<tr><td colspan="6" class="muted">尚無紀錄</td></tr>`;
      return;
    }

    history.forEach(item => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="mono">${item.calc}</td>
        <td class="mono">${item.respawn}</td>
        <td>${item.people}</td>
        <td>${item.remark ? escapeHtml(item.remark) : "-"}</td>
        <td>${statusText(item)}</td>
        <td><button class="danger tiny" data-id="${item.id}">刪除</button></td>
      `;
      historyBody.appendChild(tr);
    });

    historyBody.querySelectorAll("button[data-id]").forEach(btn => {
      btn.onclick = () => {
        const id = btn.dataset.id;
        history = history.filter(x => x.id !== id);
        saveHistory();
        renderHistory();
      };
    });
  }

  function dedupeOnLoad() {
    // 同備註合併：同 key 留最新 calcTs（空備註不合併）
    const map = new Map();
    history.forEach(item => {
      const key = safeRemarkKey(item.remark);
      if (key === "") {
        map.set(item.id, item);
        return;
      }
      const prev = map.get(key);
      if (!prev || item.calcTs > prev.calcTs) map.set(key, item);
    });
    history = Array.from(map.values());
  }

  // 每 1 秒掃描：到點就通知一次（不做聲音）
  function startNotifierTicker() {
    if (tickTimer) clearInterval(tickTimer);

    tickTimer = setInterval(() => {
      const now = Date.now();
      let changed = false;

      const canNotify = canUseNotification() && Notification.permission === "granted";

      // 到點通知 + 立刻把過期刪掉（不必等重整）
      // 你只要求「重整刪過期」，但這樣更乾淨
      // 若你不想要這段自動刪除，把 markedExpired / filter 那段拿掉即可
      const kept = [];
      for (const item of history) {
        if (now >= item.respawnTs) {
          if (!item.notified && canNotify) {
            notifyRespawn(item);
          }
          changed = true; // 因為會刪掉（過期）
          continue; // 不保留
        } else {
          kept.push(item);
        }
      }
      if (changed) {
        history = kept;
        saveHistory();
      }
      renderHistory();
    }, 1000);
  }

  // ===== 事件 =====
  document.getElementById("calcBtn").onclick = () => {
    const { h, m, s, people } = normalize();
    const now = new Date();
    const nowTs = now.getTime();

    const respawnTs = nowTs
      + (h * 3600 + m * 60 + s) * 1000
      + FIXED_BONUS_MINUTES * 60 * 1000;

    const target = new Date(respawnTs);

    const remark = remarkEl.value.trim();
    const key = safeRemarkKey(remark);

    respawnText.textContent = format(target);
    resultBox.style.display = "block";

    // 同備註合併：若 key 非空，先刪掉舊的同 key 記錄
    if (key !== "") {
      history = history.filter(item => safeRemarkKey(item.remark) !== key);
    }

    history.push({
      id: `${Date.now()}_${Math.random().toString(16).slice(2)}`,
      calc: format(now),
      respawn: format(target),
      calcTs: nowTs,
      respawnTs,
      people,
      remark,
      notified: false
    });

    sortAndTrim();
    saveHistory();
    renderHistory();
  };

  document.getElementById("resetBtn").onclick = () => {
    hEl.value = 0;
    mEl.value = 0;
    sEl.value = 0;
    peopleEl.value = 5;
    remarkEl.value = "";
    resultBox.style.display = "none";
  };

  clearHistoryBtn.onclick = () => {
    history = [];
    saveHistory();
    renderHistory();
  };

  notifyBtn.onclick = async () => {
    await requestNotifyPermission();
  };

  // ===== 初始化 =====
  function init() {
    updateNow();
    setInterval(updateNow, 1000);

    updateNotifyUI();

    // 載入歷程（兼容舊資料）
    history = loadHistory().map(item => {
      const calcTs = Number(item.calcTs) || Date.parse(item.calc) || Date.now();
      const respawnTs = Number(item.respawnTs) || Date.parse(item.respawn) || Date.now();

      return {
        id: item.id || `${Date.now()}_${Math.random().toString(16).slice(2)}`,
        calc: item.calc || format(new Date(calcTs)),
        respawn: item.respawn || format(new Date(respawnTs)),
        calcTs,
        respawnTs,
        people: Number(item.people) || 5,
        remark: item.remark || "",
        notified: Boolean(item.notified)
      };
    });

    // 先合併同備註、排序
    dedupeOnLoad();
    sortAndTrim();

    // ✅ 重整後刪除過期（你要的）
    const purged = purgeExpiredOnLoad();

    // 存回並渲染
    if (purged) saveHistory();
    renderHistory();

    // 仍然開 ticker：到點通知 + 自動清理（可保持乾淨）
    startNotifierTicker();
  }

  init();
</script>

</body>
</html>
